name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Create virtual environment (Python 3.12)
        run: uv venv --python 3.12

      - name: Install test tools (pytest, ruff)
        run: uv pip install pytest ruff

      - name: Run pytest
        run: uv run python -m pytest -q

      - name: Run ruff
        run: uv run python -m ruff check src tests --no-cache
